services:
  registry:
    image: registry:3.1.0
    restart: unless-stopped
    volumes:
      - ./data:/var/lib/registry

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "1080:80"
      - "1443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./auth/htpasswd:/etc/caddy/htpasswd:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - registry

volumes:
  caddy_data:
  caddy_config: